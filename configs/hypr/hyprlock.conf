# ~/.config/hypr/hyprlock.conf
general {
    screencopy_mode = 0
}

animations {
    enabled = false
}

background {
    monitor =
    color = rgba(0, 0, 0, 1.0)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    inner_color = rgb(0, 0, 0)
    outer_color = rgb(0, 0, 0)
    check_color = rgb(0, 0, 0)
    fail_color = rgb(0, 0, 0)

    font_color = rgb(0, 200, 0)

    fade_on_empty = false
    hide_input = false
    placeholder_text =

    position = 0, 0
    halign = center
    valign = center
}
